name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend-changed: ${{ steps.changes.outputs.frontend }}
      backend-changed: ${{ steps.changes.outputs.backend }}
      score-service-changed: ${{ steps.changes.outputs.score-service }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Detect changes
        uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'
              - 'proto/**'
            score-service:
              - 'score_service/**'
              - 'proto/**'
            docker-compose:
              - 'docker-compose.yml'
              - '.github/workflows/**'

  build-frontend:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend-changed == 'true'
    environment: deploy
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/kaoyan-rank-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/kaoyan-rank-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-backend:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend-changed == 'true'
    environment: deploy
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/kaoyan-rank-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/kaoyan-rank-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-score-service:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.score-service-changed == 'true'
    environment: deploy
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push score_service image
        uses: docker/build-push-action@v5
        with:
          context: ./score_service
          file: ./score_service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/kaoyan-rank-score-service:latest
            ${{ secrets.DOCKER_USERNAME }}/kaoyan-rank-score-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: [detect-changes, build-frontend, build-backend, build-score-service]
    # Deploy if any service changed and built successfully, OR if only docker-compose/workflow changed
    if: |
      always() && 
      (needs.build-frontend.result == 'success' || needs.build-backend.result == 'success' || needs.build-score-service.result == 'success' || 
      (needs.build-frontend.result == 'skipped' && needs.build-backend.result == 'skipped' && needs.build-score-service.result == 'skipped' && needs.detect-changes.outputs.docker-compose-changed == 'true'))
    environment: deploy
    steps:
      - name: Deploy to production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: 22
          script: |
            cd /root/kaoyan_rank_docker_cmd
            ./kaoyan-rank-frontend.sh
